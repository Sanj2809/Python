{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 mt-5">
        <div class="card shadow p-4 border-0">
            <h3 class="text-center text-primary mb-4">🔑 Đăng Nhập Thành Viên</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Tên tài khoản</label>
                    <input type="text" name="username" class="form-control" required placeholder="Nhập tài khoản học sinh...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng nhập trang web</button>
            </form>
            <p class="text-center mt-3 small">Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký tại đây</a></p>
        </div>
    </div>
</div>
{% endblock %}
